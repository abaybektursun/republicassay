<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>og poster</title>
<style>
  @font-face {
    font-family: "Instrument Serif";
    src: url(/_next/static/media/e41d5df559864f9e-s.p.1g73gv09-xcb6.woff2) format("woff2");
  }
  @font-face { font-family: "Geist Mono"; src: url(/_next/static/media/797e433ab948586e-s.p.0r6juujl39pe6.woff2) format("woff2"); }

  * { margin: 0; padding: 0; }
  body { width: 1200px; height: 630px; overflow: hidden; }
  .card {
    position: relative;
    width: 1200px; height: 630px;
    background: #F7F3EA;
    font-family: "Geist Mono", monospace;
  }
  .scene { position: absolute; inset: 0; }
  .eyebrow {
    position: absolute; left: 84px; top: 118px;
    font-size: 19px; letter-spacing: 0.24em; color: #6E675C;
  }
  .headline {
    position: absolute; left: 80px; top: 158px;
    font-family: "Instrument Serif", Georgia, serif;
    font-size: 124px; line-height: 0.98; letter-spacing: -0.015em;
    color: #2E2A24;
  }
  .headline .gold { color: #96701D; }
  .sub {
    position: absolute; left: 84px; top: 452px;
    font-size: 21px; line-height: 1.55; color: #6E675C; max-width: 620px;
  }
  .url {
    position: absolute; left: 84px; bottom: 40px;
    font-size: 20px; letter-spacing: 0.08em; color: #2E2A24;
  }
  .url .dot { color: #96701D; }
</style>
</head>
<body>
<div class="card">
  <svg class="scene" viewBox="0 0 1200 630" fill="none">
    <!-- arc of thirteen stars across the top -->
    <g fill="#96701D" opacity="0.75">
      <!-- star path: 4-point, drawn per position via use -->
      <defs>
        <path id="star" d="M0 -8 L1.9 -1.9 L8 0 L1.9 1.9 L0 8 L-1.9 1.9 L-8 0 L-1.9 -1.9 Z"/>
      </defs>
      <use href="#star" transform="translate(96 96) scale(0.7)"/>
      <use href="#star" transform="translate(180 78) scale(0.55)"/>
      <use href="#star" transform="translate(266 64) scale(0.7)"/>
      <use href="#star" transform="translate(354 54) scale(0.5)"/>
      <use href="#star" transform="translate(444 47) scale(0.65)"/>
      <use href="#star" transform="translate(535 43) scale(0.5)"/>
      <use href="#star" transform="translate(626 42) scale(0.8)"/>
      <use href="#star" transform="translate(717 44) scale(0.5)"/>
      <use href="#star" transform="translate(808 49) scale(0.65)"/>
      <use href="#star" transform="translate(898 57) scale(0.5)"/>
      <use href="#star" transform="translate(987 68) scale(0.7)"/>
      <use href="#star" transform="translate(1073 82) scale(0.55)"/>
      <use href="#star" transform="translate(1156 99) scale(0.7)"/>
    </g>

    <!-- engraved dawn: half-risen sun on the horizon, right side -->
    <g>
      <clipPath id="above"><rect x="0" y="0" width="1200" height="560"/></clipPath>
      <g clip-path="url(#above)">
        <circle cx="985" cy="560" r="200" fill="#C89B3C" opacity="0.14"/>
        <circle cx="985" cy="560" r="200" stroke="#96701D" stroke-width="2" opacity="0.55"/>
        <circle cx="985" cy="560" r="152" stroke="#96701D" stroke-width="1.2" opacity="0.35"/>
        <!-- radiating engraved rays -->
        <g stroke="#96701D" stroke-width="1.6" opacity="0.5">
          <line x1="985" y1="322" x2="985" y2="272"/>
          <line x1="1088" y1="352" x2="1116" y2="311"/>
          <line x1="1160" y1="431" x2="1205" y2="408"/>
          <line x1="882" y1="352" x2="854" y2="311"/>
          <line x1="810" y1="431" x2="765" y2="408"/>
          <line x1="1188" y1="524" x2="1240" y2="515"/>
          <line x1="782" y1="524" x2="730" y2="515"/>
          <line x1="1042" y1="330" x2="1058" y2="283"/>
          <line x1="928" y1="330" x2="912" y2="283"/>
          <line x1="1122" y1="385" x2="1157" y2="350"/>
          <line x1="848" y1="385" x2="813" y2="350"/>
          <line x1="1178" y1="470" x2="1226" y2="454"/>
          <line x1="792" y1="470" x2="744" y2="454"/>
        </g>
      </g>
      <!-- horizon -->
      <line x1="0" y1="560" x2="1200" y2="560" stroke="#2E2A24" stroke-width="1.6" opacity="0.9"/>
      <line x1="0" y1="576" x2="1200" y2="576" stroke="#96701D" stroke-width="1" opacity="0.35"/>
    </g>

    <!-- faint trace of the ranking chart, standing on the horizon -->
    <g opacity="0.85">
      <line x1="700" y1="468" x2="700" y2="560" stroke="#2E2A24" stroke-width="1.4" opacity="0.6"/>
      <rect x="700" y="476" width="52" height="10" rx="2" fill="#C89B3C"/>
      <rect x="700" y="497" width="34" height="10" rx="2" fill="#2E2A24" opacity="0.75"/>
      <rect x="672" y="518" width="28" height="10" rx="2" fill="#2E2A24" opacity="0.55"/>
      <rect x="658" y="539" width="42" height="10" rx="2" fill="#96701D" opacity="0.6"/>
    </g>
  </svg>

  <div class="eyebrow">REPUBLIC ASSAY · A PUBLIC AI ACCOUNTABILITY INITIATIVE</div>
  <div class="headline">Transparency<br>for the <span class="gold">Republic.</span></div>
  <div class="sub">Measuring open&#8209;weight AI against the values of
    the American Republic — read from the weights.</div>
  <div class="url"><span class="dot">●</span>&nbsp; republicassay.us</div>
</div>
</body>
</html>
